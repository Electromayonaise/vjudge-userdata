<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VJudge Stats Dashboard</title>

    <!-- Google Font similar to Vercel -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">

      <header class="header">
        <h1>VJudge Stats</h1>
        <p class="subtitle">Minimal competitive programming analytics</p>
      </header>

      <section class="card search-card">
        <form id="searchForm" class="search-form">
          <input
            type="text"
            id="username"
            placeholder="Enter VJudge username..."
            required
          />
          <button type="submit" class="primary-btn">Search</button>
        </form>
      </section>

      <section class="card submissions-card">
        <div class="section-header">
          <h2>Submissions</h2>

          <div class="controls">
            <div class="view-switch">
              <button id="tableViewBtn" class="ghost-btn active">
                Table
              </button>
              <button id="jsonViewBtn" class="ghost-btn">
                JSON
              </button>
            </div>

            <div class="page-size">
              <label for="pageSizeInput">Results</label>
              <input
                type="number"
                id="pageSizeInput"
                value="20"
                min="1"
              />
              <button id="applyPageSizeBtn" class="ghost-btn">
                Apply
              </button>
            </div>
          </div>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>OJ</th>
                <th>Problem</th>
                <th>VJudge ID</th>
                <th>Contest</th>
                <th>Contest Problem</th>
                <th>Status</th>
                <th>Raw Difficulty</th>
                <th>Normalized</th>
              </tr>
            </thead>
            <tbody id="submissions"></tbody>
          </table>
        </div>

        <pre id="jsonView" class="json-view hidden"></pre>

        <div id="pagination" class="pagination"></div>
      </section>

      <section class="card metrics-card">
        <h2>Metrics</h2>
        <div id="metrics"></div>
      </section>

    </div>

    <script src="app.js"></script>
  </body>
</html>
