<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>VJudge Stats Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">
        <h1>VJudge Stats Dashboard</h1>
        <p class="subtitle">Custom Node Client – Viability Test</p>

        <div class="search-box">
            <input type="text" id="username" placeholder="Enter VJudge username">
            <button onclick="fetchStats()">Get Stats</button>
        </div>

        <div id="loading" class="hidden"></div>

        <div id="results" class="hidden">
            <div class="card">
                <h3>Raw JSON Response</h3>
                <pre id="jsonOutput"></pre>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
